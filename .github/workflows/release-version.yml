name: Publish new theme version

on:
  push:
    # Release tags must exactly match manifest.json's version, without a leading "v".
    tags:
      - "*" # Validation below rejects tags such as v1.0.0 or any manifest mismatch.

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3
      - name: Validate release version
        id: release-version
        shell: bash
        run: |
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          TAG_NAME="${GITHUB_REF_NAME}"

          if [[ "$MANIFEST_VERSION" == v* ]]; then
            echo "::error::manifest.json version must not start with 'v': ${MANIFEST_VERSION}"
            exit 1
          fi

          if [[ "$TAG_NAME" == v* ]]; then
            echo "::error::Release tag must not start with 'v': ${TAG_NAME}. Use '${TAG_NAME#v}' only if it matches manifest.json."
            exit 1
          fi

          if [[ "$TAG_NAME" != "$MANIFEST_VERSION" ]]; then
            echo "::error::Release tag '${TAG_NAME}' must exactly match manifest.json version '${MANIFEST_VERSION}'."
            exit 1
          fi

          echo "version=${MANIFEST_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Bundle
        id: bundle
        run: |
          ls
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.release-version.outputs.version }}
          release_name: ${{ steps.release-version.outputs.version }}
          draft: false
          prerelease: false
      - name: Upload manifest.json
        id: upload-manifest
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./manifest.json
          asset_name: manifest.json
          asset_content_type: application/json
      - name: Upload theme.css
        id: upload-css
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./theme.css
          asset_name: theme.css
          asset_content_type: text/css
      - name: Prepare open font pack (optional)
        id: prep-font-pack
        shell: bash
        run: |
          if [ -d "fonts/open" ] && [ -n "$(find fonts/open -type f -print -quit)" ]; then
            mkdir -p dist
            FILE_NAME="font-pack-open.zip"
            ZIP_INPUTS="fonts/open"
            if [ -f "FONT-LICENSES.md" ]; then
              ZIP_INPUTS="${ZIP_INPUTS} FONT-LICENSES.md"
            fi
            zip -r "dist/${FILE_NAME}" ${ZIP_INPUTS}
            echo "has_font_pack=true" >> "$GITHUB_OUTPUT"
            echo "font_pack_path=dist/${FILE_NAME}" >> "$GITHUB_OUTPUT"
            echo "font_pack_name=${FILE_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "has_font_pack=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload open font pack
        if: steps.prep-font-pack.outputs.has_font_pack == 'true'
        id: upload-font-pack
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./${{ steps.prep-font-pack.outputs.font_pack_path }}
          asset_name: ${{ steps.prep-font-pack.outputs.font_pack_name }}
          asset_content_type: application/zip
